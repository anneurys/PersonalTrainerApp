<!DOCTYPE html>
<html>
<head>
    <title>Add Workout</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
            margin-top: 60px;
        }
        h1 {
            color: #2b6cb0;
        }
        form {
            background: white;
            width: 400px;
            margin: 0 auto;
            padding: 20px 30px;
            box-shadow: 0 0 8px rgba(0,0,0,0.1);
            border-radius: 8px;
        }
        label {
            display: block;
            text-align: left;
            margin-top: 10px;
            margin-bottom: 4px;
            font-weight: bold;
        }
        input[type="text"],
        input[type="number"],
        input[type="date"] {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            box-sizing: border-box;
        }
        button, a.back-link {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background-color: #2b6cb0;
            color: white;
            border-radius: 6px;
            text-decoration: none;
            border: none;
            cursor: pointer;
        }
        button:hover,
        a.back-link:hover {
            background-color: #1a4c8e;
        }
    </style>
</head>
<body>
    <h1>Add a Workout</h1>

    <form action="/add" method="post">
        <label for="workout_date">Date</label>
        <input type="date" id="workout_date" name="workout_date" required>

        <label for="exercise">Exercise</label>
        <input type="text" id="exercise" name="exercise" placeholder="e.g., Deadlift" required>

        <label for="sets">Sets</label>
        <input type="number" id="sets" name="sets" min="1" required>

        <label for="reps">Reps</label>
        <input type="number" id="reps" name="reps" min="1" required>

        <button type="submit">Save Workout</button>
    </form>

    <a href="/workouts" class="back-link">Back to Workouts</a>
</body>
</html>
