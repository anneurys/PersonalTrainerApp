<!DOCTYPE html>
<html>
<head>
    <title>Personal Trainer App</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            text-align: center; 
            margin-top: 80px; 
            background-color: #f4f4f4;
        }
        h1 { 
            color: #2b6cb0; 
        }
        p { 
            color: #333; 
            font-size: 18px; 
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #2b6cb0;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        button:hover {
            background-color: #1a4c8e;
        }
    </style>
</head>
<body>
    <h1>Welcome to the Personal Trainer App 💪</h1>
    <p>Track your workouts, stay consistent, and reach your goals.</p>

    <!-- this button will link to your workout page -->
    <form action="/workouts">
        <button type="submit">View Workouts</button>
        <a href="/today" class="btn">See Today's Workout Plan</a>
    </form>
</body>
</html>
