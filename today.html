<!DOCTYPE html>
<html>
<head>
    <title>Today's Workout</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f4;
            margin-top: 60px;
        }
        h1 {
            color: #2b6cb0;
        }
        h2 {
            margin-top: 10px;
        }
        table {
            margin: 30px auto;
            border-collapse: collapse;
            width: 70%;
            background: white;
            box-shadow: 0 0 8px rgba(0,0,0,0.1);
        }
        th, td {
            border: 1px solid #ddd;
            padding: 12px;
        }
        th {
            background-color: #2b6cb0;
            color: white;
        }
        a.btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #2b6cb0;
            color: white;
            border-radius: 6px;
            text-decoration: none;
        }
        a.btn:hover {
            background-color: #1a4c8e;
        }
    </style>
</head>
<body>
    <h1>Today's Workout – {{ weekday }}</h1>
    <h2>{{ title }}</h2>

    {% if exercises %}
    <table>
        <tr>
            <th>#</th>
            <th>Exercise</th>
            <th>Sets</th>
            <th>Reps</th>
        </tr>
        {% for ex in exercises %}
        <tr>
            <td>{{ loop.index }}</td>
            <td>{{ ex.name }}</td>
            <td>{{ ex.sets }}</td>
            <td>{{ ex.reps }}</td>
        </tr>
        {% endfor %}
    </table>
    {% else %}
    <p>Today is a rest or recovery day. 😴</p>
    {% endif %}

    <a href="/" class="btn">Back to Home</a>
    <a href="/workouts" class="btn">View Logged Workouts</a>
</body>
</html>
