<!DOCTYPE html>
<html>
<head>
    <title>Workout Tracker</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f4;
            margin-top: 60px;
        }
        h1 {
            color: #2b6cb0;
        }
        table {
            margin: 30px auto;
            border-collapse: collapse;
            width: 70%;
            background: white;
            box-shadow: 0 0 8px rgba(0,0,0,0.1);
        }
        th, td {
            border: 1px solid #ddd;
            padding: 12px;
        }
        th {
            background-color: #2b6cb0;
            color: white;
        }
        tr:nth-child(even) {
            background-color: #f9f9f9;
        }
        a {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #2b6cb0;
            color: white;
            border-radius: 6px;
            text-decoration: none;
        }
        a:hover {
            background-color: #1a4c8e;
        }
    </style>
</head>
<body>
    <h1>My Workouts 🏋️‍♀️</h1>
    
<a href="/add" style="display:inline-block; margin-bottom:15px; padding:10px 20px; background-color:#2b6cb0; color:white; text-decoration:none; border-radius:6px;">
    + Add Workout
</a>

    <table>
        <tr>
            <th>Date</th>
            <th>Exercise</th>
            <th>Sets</th>
            <th>Reps</th>
        </tr>

        {% for w in workouts %}
        <tr>
            <td>{{ w['workout_date'] }}</td>
            <td>{{ w['exercise'] }}</td>
            <td>{{ w['sets'] }}</td>
            <td>{{ w['reps'] }}</td>
        </tr>
        {% endfor %}
    </table>

    <a href="/">Back to Home</a>
</body>
</html>
